<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow" style="width: 360px">
    <div class="card-body p-4">
      <h4 class="card-title text-center mb-4">
        <i class="bi bi-journal-richtext me-2 text-primary"></i>ScienClassifier
      </h4>

      @if (error) {
        <div class="alert alert-danger py-2">{{ error }}</div>
      }

      <form (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input class="form-control" [(ngModel)]="username" name="username" required autofocus />
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input class="form-control" type="password" [(ngModel)]="password" name="password" required />
        </div>
        <button class="btn btn-primary w-100" type="submit" [disabled]="loading">
          @if (loading) { <span class="spinner-border spinner-border-sm me-2"></span> }
          Iniciar sesión
        </button>
      </form>

      <hr />
      <p class="text-center mb-0 small">
        ¿No tienes cuenta? <a routerLink="/register">Regístrate</a>
      </p>
    </div>
  </div>
</div>
