# Docker Swarm Stack — ScienClassifier
#
# ANTES DE DESPLEGAR:
#   1. Copiar y editar variables:  cp .env.example .env
#   2. Inicializar el Swarm:       just init-swarm
#   3. Unir los otros nodos:       just join-swarm-manager (en cada nodo)
#   4. Etiquetar nodos:            just label-node <hostname>  (en los 3)
#   5. Desplegar:                  just deploy
#
# NOTA: depends_on es ignorado por Swarm. Todos los servicios tienen
#       restart_policy: on-failure para manejar el orden de arranque.

services:

  # ================================================================
  # etcd — quorum Raft de 3 nodos
  # Tolera caer 1 nodo. Usa el hostname del nodo para nombre único.
  # ================================================================

  etcd1:
    image: quay.io/coreos/etcd:v3.4.33
    command:
      - /usr/local/bin/etcd
      - --name=etcd1
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:${ETCD3_PORT}
      - --advertise-client-urls=http://etcd1:${ETCD3_PORT}
      - --listen-peer-urls=http://0.0.0.0:${ETCD3_PEER_PORT}
      - --initial-advertise-peer-urls=http://etcd1:${ETCD3_PEER_PORT}
      - --initial-cluster=etcd1=http://etcd1:${ETCD3_PEER_PORT},etcd2=http://etcd2:${ETCD3_PEER_PORT},etcd3=http://etcd3:${ETCD3_PEER_PORT}
      - --initial-cluster-token=${ETCD3_CLUSTER_TOKEN}
      - --initial-cluster-state=new
    volumes:
      - etcd1_data:/etcd-data
    networks:
      - red_distribuida
    deploy:
      placement:
        constraints:
          - node.labels.etcd == true
          - node.hostname == ${NODE1_HOSTNAME}
      restart_policy:
        condition: on-failure
        delay: 5s

  etcd2:
    image: quay.io/coreos/etcd:v3.4.33
    command:
      - /usr/local/bin/etcd
      - --name=etcd2
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:${ETCD3_PORT}
      - --advertise-client-urls=http://etcd2:${ETCD3_PORT}
      - --listen-peer-urls=http://0.0.0.0:${ETCD3_PEER_PORT}
      - --initial-advertise-peer-urls=http://etcd2:${ETCD3_PEER_PORT}
      - --initial-cluster=etcd1=http://etcd1:${ETCD3_PEER_PORT},etcd2=http://etcd2:${ETCD3_PEER_PORT},etcd3=http://etcd3:${ETCD3_PEER_PORT}
      - --initial-cluster-token=${ETCD3_CLUSTER_TOKEN}
      - --initial-cluster-state=new
    volumes:
      - etcd2_data:/etcd-data
    networks:
      - red_distribuida
    deploy:
      placement:
        constraints:
          - node.labels.etcd == true
          - node.hostname == ${NODE2_HOSTNAME}
      restart_policy:
        condition: on-failure
        delay: 5s

  etcd3:
    image: quay.io/coreos/etcd:v3.4.33
    command:
      - /usr/local/bin/etcd
      - --name=etcd3
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:${ETCD3_PORT}
      - --advertise-client-urls=http://etcd3:${ETCD3_PORT}
      - --listen-peer-urls=http://0.0.0.0:${ETCD3_PEER_PORT}
      - --initial-advertise-peer-urls=http://etcd3:${ETCD3_PEER_PORT}
      - --initial-cluster=etcd1=http://etcd1:${ETCD3_PEER_PORT},etcd2=http://etcd2:${ETCD3_PEER_PORT},etcd3=http://etcd3:${ETCD3_PEER_PORT}
      - --initial-cluster-token=${ETCD3_CLUSTER_TOKEN}
      - --initial-cluster-state=new
    volumes:
      - etcd3_data:/etcd-data
    networks:
      - red_distribuida
    deploy:
      placement:
        constraints:
          - node.labels.etcd == true
          - node.hostname == ${NODE3_HOSTNAME}
      restart_policy:
        condition: on-failure
        delay: 5s

  # ================================================================
  # Patroni + PostgreSQL — 1 primary + 2 replicas
  # Si cae el primary, etcd detecta el fallo y elige uno nuevo.
  # ================================================================

  patroni1:
    image: ghcr.io/zalando/spilo-17:4.0-p3
    hostname: patroni1
    environment:
      SCOPE: ${SCOPE}
      ETCD3_HOSTS: "etcd1:${ETCD3_PORT},etcd2:${ETCD3_PORT},etcd3:${ETCD3_PORT}"
      ALLOW_NOSSL: "true"
      PGROOT: ${PGROOT}
      PGUSER_SUPERUSER: ${PGUSER_SUPERUSER}
      PGPASSWORD_SUPERUSER: ${PGPASSWORD_SUPERUSER}
      PGUSER_STANDBY: ${PGUSER_STANDBY}
      PGPASSWORD_STANDBY: ${PGPASSWORD_STANDBY}
      PGUSER_ADMIN: ${PGUSER_ADMIN}
      USE_ADMIN: ${USE_ADMIN}
      PGPASSWORD_ADMIN: ${PGPASSWORD_ADMIN}
      PGPORT: ${PGPORT}
      INITDB_LOCALE: ${INITDB_LOCALE}
    volumes:
      - patroni1_data:${PGROOT}/data
    ports:
      - target: 8008
        published: 8008
        mode: host
    networks:
      - red_distribuida
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE1_HOSTNAME}
      restart_policy:
        condition: on-failure
        delay: 10s

  patroni2:
    image: ghcr.io/zalando/spilo-17:4.0-p3
    hostname: patroni2
    environment:
      SCOPE: ${SCOPE}
      ETCD3_HOSTS: "etcd1:${ETCD3_PORT},etcd2:${ETCD3_PORT},etcd3:${ETCD3_PORT}"
      ALLOW_NOSSL: "true"
      PGROOT: ${PGROOT}
      PGUSER_SUPERUSER: ${PGUSER_SUPERUSER}
      PGPASSWORD_SUPERUSER: ${PGPASSWORD_SUPERUSER}
      PGUSER_STANDBY: ${PGUSER_STANDBY}
      PGPASSWORD_STANDBY: ${PGPASSWORD_STANDBY}
      PGUSER_ADMIN: ${PGUSER_ADMIN}
      USE_ADMIN: ${USE_ADMIN}
      PGPASSWORD_ADMIN: ${PGPASSWORD_ADMIN}
      PGPORT: ${PGPORT}
      INITDB_LOCALE: ${INITDB_LOCALE}
    volumes:
      - patroni2_data:${PGROOT}/data
    networks:
      - red_distribuida
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE2_HOSTNAME}
      restart_policy:
        condition: on-failure
        delay: 10s

  patroni3:
    image: ghcr.io/zalando/spilo-17:4.0-p3
    hostname: patroni3
    environment:
      SCOPE: ${SCOPE}
      ETCD3_HOSTS: "etcd1:${ETCD3_PORT},etcd2:${ETCD3_PORT},etcd3:${ETCD3_PORT}"
      ALLOW_NOSSL: "true"
      PGROOT: ${PGROOT}
      PGUSER_SUPERUSER: ${PGUSER_SUPERUSER}
      PGPASSWORD_SUPERUSER: ${PGPASSWORD_SUPERUSER}
      PGUSER_STANDBY: ${PGUSER_STANDBY}
      PGPASSWORD_STANDBY: ${PGPASSWORD_STANDBY}
      PGUSER_ADMIN: ${PGUSER_ADMIN}
      USE_ADMIN: ${USE_ADMIN}
      PGPASSWORD_ADMIN: ${PGPASSWORD_ADMIN}
      PGPORT: ${PGPORT}
      INITDB_LOCALE: ${INITDB_LOCALE}
    volumes:
      - patroni3_data:${PGROOT}/data
    networks:
      - red_distribuida
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE3_HOSTNAME}
      restart_policy:
        condition: on-failure
        delay: 10s

  # ================================================================
  # MinIO — 3 nodos × 2 drives = 6 drives, erasure coding 3+3
  # Tolera perder 1 nodo completo sin pérdida de datos.
  # Consola web en puerto 9001 (modo host, cada nodo la expone).
  # ================================================================

  minio1:
    image: minio/minio:latest
    command: server http://minio{1...3}/data{1...2} --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio1_data1:/data1
      - minio1_data2:/data2
    ports:
      - target: 9001
        published: 9001
        mode: host
    networks:
      - red_distribuida
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      placement:
        constraints:
          - node.labels.minio == true
          - node.hostname == ${NODE1_HOSTNAME}
      restart_policy:
        condition: any
        delay: 10s

  minio2:
    image: minio/minio:latest
    command: server http://minio{1...3}/data{1...2} --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio2_data1:/data1
      - minio2_data2:/data2
    ports:
      - target: 9001
        published: 9001
        mode: host
    networks:
      - red_distribuida
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      placement:
        constraints:
          - node.labels.minio == true
          - node.hostname == ${NODE2_HOSTNAME}
      restart_policy:
        condition: any
        delay: 10s

  minio3:
    image: minio/minio:latest
    command: server http://minio{1...3}/data{1...2} --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio3_data1:/data1
      - minio3_data2:/data2
    ports:
      - target: 9001
        published: 9001
        mode: host
    networks:
      - red_distribuida
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      placement:
        constraints:
          - node.labels.minio == true
          - node.hostname == ${NODE3_HOSTNAME}
      restart_policy:
        condition: any
        delay: 10s

  # ================================================================
  # RabbitMQ — cluster de 3 nodos
  # Peer discovery via rabbitmq.conf inyectado con Swarm configs.
  # ERLANG_COOKIE debe ser idéntica en los 3 nodos.
  # ================================================================

  rabbitmq1:
    image: rabbitmq:3.13-management
    hostname: rabbitmq1
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_NODENAME: rabbit@rabbitmq1
    configs:
      - source: rabbitmq_conf
        target: /etc/rabbitmq/rabbitmq.conf
    volumes:
      - rabbitmq1_data:/var/lib/rabbitmq
    networks:
      - red_distribuida
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE1_HOSTNAME}
      restart_policy:
        condition: on-failure

  rabbitmq2:
    image: rabbitmq:3.13-management
    hostname: rabbitmq2
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_NODENAME: rabbit@rabbitmq2
    configs:
      - source: rabbitmq_conf
        target: /etc/rabbitmq/rabbitmq.conf
    volumes:
      - rabbitmq2_data:/var/lib/rabbitmq
    networks:
      - red_distribuida
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE2_HOSTNAME}
      restart_policy:
        condition: on-failure

  rabbitmq3:
    image: rabbitmq:3.13-management
    hostname: rabbitmq3
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_NODENAME: rabbit@rabbitmq3
    configs:
      - source: rabbitmq_conf
        target: /etc/rabbitmq/rabbitmq.conf
    volumes:
      - rabbitmq3_data:/var/lib/rabbitmq
    networks:
      - red_distribuida
    deploy:
      placement:
        constraints:
          - node.hostname == ${NODE3_HOSTNAME}
      restart_policy:
        condition: on-failure

  # ================================================================
  # FastAPI — stateless, una instancia por nodo (mode: global)
  # Multi-host PostgreSQL: libpq prueba cada host y usa el primary.
  # ================================================================

  fastapi:
    image: ${REGISTRY:-localhost}/fastapi:latest
    environment:
      DATABASE_URL: >-
        postgresql://${PGUSER_ADMIN}:${PGPASSWORD_ADMIN}@patroni1:${PGPORT},patroni2:${PGPORT},patroni3:${PGPORT}/postgres?target_session_attrs=read-write
      MINIO_ENDPOINT: minio1:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      RABBITMQ_URL: >-
        amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq1:5672/
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    networks:
      - red_distribuida
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s

  # ================================================================
  # Worker — TF-IDF classifier, una instancia por nodo (mode: global)
  # ================================================================

  worker:
    image: ${REGISTRY:-localhost}/worker:latest
    environment:
      DATABASE_URL: >-
        postgresql://${PGUSER_ADMIN}:${PGPASSWORD_ADMIN}@patroni1:${PGPORT},patroni2:${PGPORT},patroni3:${PGPORT}/postgres?target_session_attrs=read-write
      MINIO_ENDPOINT: minio1:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      RABBITMQ_URL: >-
        amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq1:5672/
    networks:
      - red_distribuida
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s

  # ================================================================
  # Nginx — punto de entrada unificado (mode: global)
  # Sirve Angular en / y proxea /api/ a FastAPI via VIP.
  # Config distribuida con Swarm configs (no requiere volumen local).
  # ================================================================

  nginx:
    image: nginx:1.25-alpine
    ports:
      - target: 80
        published: 80
        mode: host
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    networks:
      - red_distribuida
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

configs:
  rabbitmq_conf:
    file: ./rabbitmq/rabbitmq.conf
  nginx_conf:
    file: ./nginx/nginx.conf

volumes:
  etcd1_data:
  etcd2_data:
  etcd3_data:
  patroni1_data:
  patroni2_data:
  patroni3_data:
  minio1_data1:
  minio1_data2:
  minio2_data1:
  minio2_data2:
  minio3_data1:
  minio3_data2:
  rabbitmq1_data:
  rabbitmq2_data:
  rabbitmq3_data:

networks:
  red_distribuida:
    driver: overlay
    attachable: true
